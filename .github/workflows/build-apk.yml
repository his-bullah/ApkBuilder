name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          python3-pip \
          build-essential \
          git \
          zlib1g-dev \
          libncurses5-dev \
          libgdbm-dev \
          libnss3-dev \
          libssl-dev \
          libreadline-dev \
          libffi-dev \
          libsqlite3-dev \
          wget \
          libbz2-dev \
          openjdk-17-jdk \
          unzip \
          autoconf \
          automake \
          libtool \
          libtool-bin \
          pkg-config \
          cmake \
          m4 \
          libltdl-dev

    - name: Install buildozer and dependencies
      run: |
        pip install --upgrade pip
        pip install cython==0.29.33
        pip install buildozer

    - name: Setup Android SDK
      run: |
        mkdir -p /home/runner/android-sdk/cmdline-tools
        wget https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
        unzip commandlinetools-linux-9477386_latest.zip -d /home/runner/android-sdk/cmdline-tools
        mv /home/runner/android-sdk/cmdline-tools/cmdline-tools /home/runner/android-sdk/cmdline-tools/latest

        export PATH=$PATH:/home/runner/android-sdk/cmdline-tools/latest/bin
        echo "y" | sdkmanager --sdk_root=/home/runner/android-sdk \
          "platforms;android-34" \
          "build-tools;34.0.0" \
          "ndk;25.2.9519653" \
          "tools"

        mkdir -p /home/runner/android-sdk/tools/bin
        ln -s /home/runner/android-sdk/cmdline-tools/latest/bin/sdkmanager \
              /home/runner/android-sdk/tools/bin/sdkmanager

    - name: Create buildozer.spec
      run: |
        cat > buildozer.spec << 'EOF'
        [app]
        title = Shadow
        package.name = shadowbridge
        package.domain = com.ShadowBridge
        source.dir = .
        source.include_exts = py,png,jpg,kv,atlas
        version = 1.0
        requirements = python3,kivy
        services = MyService:service/main.py:foreground
        android.permissions = FOREGROUND_SERVICE
        android.api = 34
        android.minapi = 21
        android.ndk = 25.2.9519653
        android.archs = arm64-v8a, armeabi-v7a
        android.sdk_path = /home/runner/android-sdk
        android.ndk_path = /home/runner/android-sdk/ndk/25.2.9519653
        [buildozer]
        log_level = 2
        EOF

    - name: Build APK
      env:
        ANDROID_SDK_ROOT: /home/runner/android-sdk
        ANDROID_NDK_HOME: /home/runner/android-sdk/ndk/25.2.9519653
      run: |
        buildozer android debug

    - name: Upload APK
      uses: actions/upload-artifact@v3
      with:
        name: shadow-debug
        path: bin/*.apk