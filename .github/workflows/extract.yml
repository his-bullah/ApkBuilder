name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          python3-pip \
          build-essential \
          git \
          zlib1g-dev \
          libncurses5-dev \
          libgdbm-dev \
          libnss3-dev \
          libssl-dev \
          libreadline-dev \
          libffi-dev \
          libsqlite3-dev \
          wget \
          libbz2-dev \
          openjdk-17-jdk \
          unzip \
          autoconf \
          libtool \
          pkg-config \
          cmake

    - name: Install python-for-android
      run: |
        pip install python-for-android cython

    - name: Setup Android SDK
      run: |
        mkdir -p $HOME/android-sdk/cmdline-tools
        wget https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
        unzip commandlinetools-linux-9477386_latest.zip -d $HOME/android-sdk/cmdline-tools
        mv $HOME/android-sdk/cmdline-tools/cmdline-tools $HOME/android-sdk/cmdline-tools/latest

    - name: Install SDK packages
      env:
        ANDROID_SDK_ROOT: $HOME/android-sdk
      run: |
        export PATH=$PATH:$HOME/android-sdk/cmdline-tools/latest/bin
        echo "y" | sdkmanager --sdk_root=$HOME/android-sdk \
          "platforms;android-30" \
          "build-tools;30.0.3" \
          "ndk;25.2.9519653"

    - name: Build APK
      env:
        ANDROID_SDK_ROOT: /home/runner/android-sdk
        ANDROID_NDK_HOME: /home/runner/android-sdk/ndk/25.2.9519653
      run: |
        p4a apk --private . \
          --package=com.ShadowBridge \
          --name="Shadow" \
          --version=1.0 \
          --bootstrap=sdl2 \
          --requirements=python3,kivy \
          --service=MyService:service/main.py:foreground \
          --android-api=30 \
          --min-sdk-version=21 \
          --ndk-dir=/home/runner/android-sdk/ndk/25.2.9519653 \
          --arch=arm64-v8a \
          --arch=armeabi-v7a

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: myapp-debug
        path: "*.apk"